name: Build dockerfile.test

on:
  workflow_dispatch:
  
permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Lowercase repository owner
        run: echo "OWNER_LC=${OWNER,,}" >> $GITHUB_ENV
        env:
          OWNER: ${{ github.repository_owner }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: dockerfile.test
          platforms: linux/arm64
          push: true
          tags: ghcr.io/${{ env.OWNER_LC }}/docker-test:latest
          cache-from: type=registry,ref=ghcr.io/${{ env.OWNER_LC }}/docker-test:latest
          cache-to: type=registry,ref=ghcr.io/${{ env.OWNER_LC }}/docker-test:cache,mode=max
